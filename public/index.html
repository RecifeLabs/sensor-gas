<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recife Labs | Controle de Alerta</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="shell">
    <div class="grid"></div>
    <section class="panel">
      <p class="tag">RECIFE LABS • ALERT CONTROL</p>
      <button id="controlButton" class="tech-btn">LED D2: OFF</button>
      <p id="status" class="status">Sincronizando estado do LED...</p>
      <div class="sensor-box">
        <p id="sensorHeadline" class="sensor-headline">Sensor GLP: aguardando telemetria...</p>
        <p id="sensorMeta" class="status">Aguardando dados do campo...</p>
        <p id="streamStatus" class="status">Stream: conectando...</p>
        <div id="sensorLog" class="sensor-log"></div>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
